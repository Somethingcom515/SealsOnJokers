payload = 'SEALS.get_card_name(card, full_UI_table.name, specific_vars)'
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''if obj and obj.set_badges and type(obj.set_badges) == 'function' then'''
position = "before"
payload = '''
if card and card.ability then
    if card.ability.soe_quantum_enhancements and card.ability.soe_quantum_enhancements[1] then
        for _, v in ipairs(card.ability.soe_quantum_enhancements) do
            badges[#badges+1] = create_badge(G.localization.descriptions.Enhanced[v].name, G.C.SECONDARY_SET.Enhanced)
        end
    end
    if card.ability.soe_legalenhancements and next(card.ability.soe_legalenhancements) then
        local credit
        for k, v in pairs(card.ability.soe_legalenhancements) do
            for i=1, #v do
                badges[#badges+1] = create_badge(G.localization.descriptions.Enhanced[k].name, G.C.SECONDARY_SET["Enhanced"])
            end
            if not G.P_CENTERS[k].original_mod then
                credit = true
            end
        end
        if credit then badges[#badges+1] = create_badge('Art: poundpound0209', SMODS.Gradients.soe_synonym_gradient, HEX('FFFFFF')) end
    end
    if card.ability.soe_quantum_editions then
        local notfirst = {}
        for _, v in ipairs(card.ability.soe_quantum_editions) do
            if not (card.edition and card.edition.key == v) or notfirst[v] then
                badges[#badges+1] = create_badge(G.localization.descriptions.Edition[v].name, G.P_CENTERS[v].badge_colour)
            end
            notfirst[v] = true
        end
    end
    if card.ability.soe_quantum_seals and card.ability.soe_quantum_seals[1] then
        for _, v in ipairs(card.ability.soe_quantum_seals) do
            badges[#badges+1] = create_badge(localize(string.lower(v)..'_seal', 'labels'), G.P_SEALS[v].badge_colour)
        end
    end
    if card.ability.soe_detached_seal then
        badges = {}
        SMODS.create_mod_badges({mod = SEALS}, badges)
    end
end
'''
match_indent = true

