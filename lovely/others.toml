[manifest]
version = "1.0.0"
dump_lua = true
priority = 1

[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = "if #G.hand.highlighted <= 0 or G.GAME.blind.block_play or #G.hand.highlighted > 5 then"
position = "at"
payload = "if #G.hand.highlighted <= 0 or G.GAME.blind.block_play then"
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = 'for _, v in ipairs(info_queue) do'
position = "before"
payload = '''
if card and card.ability then
    if card.ability.soe_quantum_enhancements and card.ability.soe_quantum_enhancements[1] then
        for _, v in ipairs(card.ability.soe_quantum_enhancements) do
            info_queue[#info_queue+1] = G.P_CENTERS[v]
        end
    end
    if card.ability.soe_legalenhancements and next(card.ability.soe_legalenhancements) then
        for k, v in pairs(card.ability.soe_legalenhancements) do
            for _=1, #v do
                info_queue[#info_queue+1] = G.P_CENTERS[k]
            end
        end
    end
    if card.ability.soe_quantum_editions then
        local notfirst = {}
        for _, v in ipairs(card.ability.soe_quantum_editions) do
            if v ~= 'e_negative' and not (card.edition and card.edition.type == v) or notfirst[v] then
                info_queue[#info_queue+1] = G.P_CENTERS[v]
            end
            notfirst[v] = true
        end
    end
    if card.ability.soe_quantum_seals and card.ability.soe_quantum_seals[1] then
        for _, v in ipairs(card.ability.soe_quantum_seals) do
            info_queue[#info_queue+1] = G.P_SEALS[v]
        end
    end
    if card.ability.soe_jokerseals and card.ability.soe_jokerseals[1] then
        for _, v in ipairs(card.ability.soe_jokerseals) do
            info_queue[#info_queue+1] = G.P_CENTERS[v]
        end
    end
    if card.ability.soe_jokers and card.ability.soe_jokers[1] then
        for _, v in ipairs(card.ability.soe_jokers) do
            info_queue[#info_queue+1] = G.P_CENTERS[v]
        end
    end
    if card.ability.soe_mergedcards and card.ability.soe_mergedcards[1] then
        info_queue[#info_queue+1] = {set = 'Other', key = 'soe_merged_cards'}
    end
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''localize{type = 'other', key = 'playing_card', set = 'Other', nodes = full_UI_table.name, vars = {localize(specific_vars.value, 'ranks'), localize(specific_vars.suit, 'suits_plural'), colours = {specific_vars.colour}}}'''
