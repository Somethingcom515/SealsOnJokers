position = "before"
payload = '''
if next(SEALS.get_quantum_jokers(card)) then
    local extra_jokers_list, jokers_table = SEALS.get_quantum_jokers(card), {}
    table.sort(extra_jokers_list, function(a, b) return (G.P_CENTERS[a].order or 0) < (G.P_CENTERS[b].order or 0) end)
    for _, k in ipairs(extra_jokers_list) do
        SEALS.copy_card_but_not(card, k)
        local my_pos = math.huge
        for i, v in ipairs(G.jokers.cards) do
            if v == card then
                my_pos = i
                break
            end
        end
        local thunk = card
        G.jokers.cards[my_pos] = G.soe_savedjokercards[card.sort_id][k]
        local joker = G.soe_savedjokercards[card.sort_id][k]:calculate_joker(context)
        G.jokers.cards[my_pos] = thunk
        if joker then
            joker.card = card
            table.insert(jokers_table, joker)
        end
    end
    if jokers then
        table.insert(jokers_table, 1, jokers)
    end
    jokers = SMODS.merge_effects(jokers_table)
end
'''
match_indent = true

