[manifest]
version = "1.0.0"
dump_lua = true
priority = 1

[[patches]]
[patches.pattern]
target = "card_character.lua"
pattern = 'self.children.card.states.visible = false'
position = "before"
payload = "self.children.card:set_seal('Red')"
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = 'G.screenwipecard = Card(1, 1, G.CARD_W, G.CARD_H, pseudorandom_element(G.P_CARDS), G.P_CENTERS.c_base)'
position = "after"
payload = "G.screenwipecard:set_seal(pseudorandom_element(G.P_SEALS, 'seal').key, true, true)"
match_indent = true

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = 'Jimbo:say_stuff((extra and extra.times) or 5, false, quip)'
position = "after"
payload = """
G.E_MANAGER:add_event(Event({
    trigger = 'after',
    delay = 1,
    blocking = false,
    func = (function()
        if G.OVERLAY_MENU and G.OVERLAY_MENU:get_UIE_by_ID('jimbo_spot') then 
            Jimbo.ui_object_updated = true
            Jimbo:add_speech_bubble('again', nil, {quip = true})
            Jimbo:say_stuff(2)
        end
        return true
    end)
}))
G.E_MANAGER:add_event(Event({
    trigger = 'after',
    delay = 1.5,
    blocking = false,
    func = (function()
        if G.OVERLAY_MENU and G.OVERLAY_MENU:get_UIE_by_ID('jimbo_spot') then 
            Jimbo.ui_object_updated = true
            Jimbo:add_speech_bubble('lq_'..math.random(1,10), nil, {quip = true})
            Jimbo:say_stuff(5)
        end
        return true
    end)
}))
"""
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = 'Jimbo:say_stuff((extra and extra.times) or 5, false, quip)'
position = "after"
payload = """
G.E_MANAGER:add_event(Event({
    trigger = 'after',
    delay = 1,
    blocking = false,
    func = (function()
        if G.OVERLAY_MENU and G.OVERLAY_MENU:get_UIE_by_ID('jimbo_spot') then 
            Jimbo.ui_object_updated = true
            Jimbo:add_speech_bubble('again', nil, {quip = true})
            Jimbo:say_stuff(2)
        end
        return true
    end)
}))
G.E_MANAGER:add_event(Event({
    trigger = 'after',
    delay = 1.5,
    blocking = false,
    func = (function()
        if G.OVERLAY_MENU and G.OVERLAY_MENU:get_UIE_by_ID('jimbo_spot') then 
            Jimbo.ui_object_updated = true
            Jimbo:add_speech_bubble('wq_'..math.random(1,7), nil, {quip = true})
            Jimbo:say_stuff(5)
        end
        return true
    end)
}))
"""
match_indent = true

# Show a Seal Seal because why not
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "replace_card.states.visible = false"
position = "before"
payload = "replace_card:set_seal('soe_sealseal', true, true)"
match_indent = true
overwrite = false

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
-- TARGET: calc_dollar_bonus per card
if ret then
    i = i+1
    add_round_eval_row({dollars = ret, bonus = true, name='joker'..i, pitch = pitch, card = _card})
    pitch = pitch + 0.06
    dollars = dollars + ret
end
'''
position = "after"
payload = '''
if ret then
    for _, __card in ipairs({_card, unpack(_card.ability.soe_mergedcards or {})}) do
        local is_real = Card.is(__card, Card)
        __card = Card.is(__card, Card) and __card or SEALS.copy_card_but_not(_card, __card.key, __card)
        local ret = is_real and ret or  __card:calculate_dollar_bonus()
        if SEALS.has_seal(__card, "Red") then
            for ii = 1, SEALS.get_seal_count(__card, 'Red') do
                SMODS.calculate_effect({message = localize('k_again_ex'), card = __card}, __card)
                i = i+1
                add_round_eval_row({dollars = ret, bonus = true, name='joker'..i, pitch = pitch, card = __card})
                pitch = pitch + 0.06
                dollars = dollars + ret
                if SEALS.has_seal(__card, "Gold") then
                    for ii = 1, SEALS.get_seal_count(__card, 'Gold') do
                        SMODS.calculate_effect({dollars = 3, card = __card}, __card)
                    end
                end
            end
        end
    end
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''=[SMODS Cryptid "lib/overrides.lua"]'''
pattern = '''
if front and G.GAME.modifiers.cry_force_seal then
    card:set_seal(G.GAME.modifiers.cry_force_seal)
end
'''
position = "at"
payload = '''
if G.GAME.modifiers.cry_force_seal then
    card:set_seal(G.GAME.modifiers.cry_force_seal)
end
'''
match_indent = true